<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KumuTranslator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="translator-wrapper">
        <div class="translator-container">
            <div class="translator-header">
                <h2>KumuTranslator</h2>
            </div>
            
            <div class="translator-content">
                <div class="translator-area">
                    <div class="textarea-container">
                        <textarea id="transinputText" placeholder="Enter English text here..."></textarea>
                    </div>
                    
                    <div class="transbutton-container">
                        <button id="transswitch">&#8597;</button>
                        <button id="translate">Translate</button>
                    </div>
                    
                    <div class="textarea-container">
                        <textarea id="transoutputText" placeholder="Translated Hawaiian text will appear here..." readonly></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
