<!-- No DOCTYPE, html, head tags when embedding in Elementor -->
<style>
    /* Stronger wrapper to ensure centering */
    
    .dictionary-wrapper {
      width: 100% !important;
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
      margin: 0 auto !important;
      padding: 20px 0 !important;
    }
    
    /* Reset some potential Elementor/Wordpress styles */
    .dictionary-wrapper * {
      box-sizing: border-box !important;
    }
    
    :root {
      --primary-color: #74a84a;
      --primary-dark: #2c541d;
      --bg-color: #f8f8f8;
      --card-bg: #ffffff;
      --text-color: #333333;
      --border-color: #e0e0e0;
    }
    
    .dictionary-container {
      width: 100% !important;
      max-width: 800px !important;
      background-color: var(--card-bg) !important;
      border-radius: 12px !important;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08) !important;
      overflow: hidden !important;
      transition: all 0.3s ease !important;
      margin: 0 auto !important;
    }
    
    .dictionary-header {
      padding: 1.5rem 2rem !important;
      background-color: var(--primary-color) !important;
      color: white !important;
      border-bottom: 1px solid var(--border-color) !important;
      text-align: left !important;
    }
    
    .dictionary-header h2 {
      font-size: 1.8rem !important;
      font-weight: 600 !important;
      margin: 0 !important;
      color: white !important;
    }
    
    .dictionary-content {
      padding: 2rem !important;
    }
    
    .input-area {
      margin-bottom: 1.5rem !important;
    }
    
    .search-container {
      position: relative !important;
      margin-bottom: 1.5rem !important;
    }
    
    #dicsearchInput {
      width: 100% !important;
      padding: 1rem !important;
      border: 2px solid var(--border-color) !important;
      border-radius: 8px !important;
      font-size: 1rem !important;
      transition: border-color 0.3s ease, box-shadow 0.3s ease !important;
    }
    
    #dicsearchInput:focus {
      outline: none !important;
      border-color: var(--primary-color) !important;
      box-shadow: 0 0 0 3px rgba(116, 168, 74, 0.2) !important;
    }
    
    #dicsearchInput:disabled {
      background-color: rgba(240, 240, 240, 0.5) !important;
      cursor: not-allowed !important;
    }
    
    .response-area {
      margin-top: 1.5rem !important;
      background-color: #f9f9f9 !important;
      border-radius: 8px !important;
      padding: 1.25rem !important;
      border-left: 4px solid var(--primary-color) !important;
      transition: all 0.3s ease !important;
      min-height: 60px !important;
      text-align: left !important;
    }
    
    .response-area.empty {
      border-left-color: var(--border-color) !important;
      background-color: #f5f5f5 !important;
    }
    
    .markdown-content {
      line-height: 1.6 !important;
      word-wrap: break-word !important;
      overflow-wrap: anywhere !important;
      color: var(--text-color) !important;
      margin: 0 !important;
      width: 100% !important;
    }

    .markdown-content > :first-child {
      margin-top: 0 !important;
    }

    .markdown-content > :last-child {
      margin-bottom: 0 !important;
    }

    .markdown-content p,
    .markdown-content ul,
    .markdown-content ol,
    .markdown-content pre,
    .markdown-content h1,
    .markdown-content h2,
    .markdown-content h3,
    .markdown-content h4,
    .markdown-content h5,
    .markdown-content h6 {
      margin: 0 0 0.9rem 0 !important;
    }

    .markdown-content ul,
    .markdown-content ol {
      padding-left: 1.5rem !important;
    }

    .markdown-content code {
      background-color: rgba(44, 84, 29, 0.08) !important;
      border-radius: 4px !important;
      padding: 0.1rem 0.35rem !important;
      font-size: 0.95em !important;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace !important;
    }

    .markdown-content a {
      color: var(--primary-dark) !important;
      text-decoration: underline !important;
    }

    #dicresponse {
      line-height: 1.6 !important;
      word-wrap: break-word !important;
      color: var(--text-color) !important;
      margin: 0 !important;
    }
    
    .button-container {
      margin-top: 1.5rem !important;
      display: flex !important;
      justify-content: center !important;
    }
    
    #dicsubmitButton {
      background-color: var(--primary-color) !important;
      color: white !important;
      border: none !important;
      border-radius: 6px !important;
      padding: 0.75rem 1.5rem !important;
      font-size: 1rem !important;
      font-weight: 500 !important;
      cursor: pointer !important;
      transition: background-color 0.3s ease, transform 0.2s ease !important;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1) !important;
      min-width: 120px !important;
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
    }
    
    #dicsubmitButton:hover {
      background-color: var(--primary-dark) !important;
      transform: translateY(-2px) !important;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15) !important;
    }
    
    #dicsubmitButton:active {
      transform: translateY(0) !important;
    }
    
    #dicsubmitButton:disabled {
      opacity: 0.7 !important;
      cursor: not-allowed !important;
    }
    
    .loading-dots::after {
      content: '';
      animation: dots 1.5s infinite;
    }
    
    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }
    
    @media (max-width: 768px) {
      .dictionary-wrapper {
        padding: 1rem !important;
      }
      
      .dictionary-header, .dictionary-content {
        padding: 1.25rem !important;
      }
    }
</style>

<div class="dictionary-wrapper">
  <div class="dictionary-container">
    <div class="dictionary-header">
      <h2>KumuDictionary</h2>
    </div>
    
    <div class="dictionary-content">
      <div class="input-area">
        <div class="search-container">
          <input type="text" id="dicsearchInput" placeholder="Enter Hawaiian word or phrase here">
        </div>
      </div>
      
      <div class="response-area empty">
        <div id="dicresponse" class="markdown-content"></div>
      </div>
      
      <div class="button-container">
        <button id="dicsubmitButton" class="dictionarysubmit-button">Submit</button>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var submitButton = document.getElementById("dicsubmitButton");
    var searchInput = document.getElementById("dicsearchInput");
    var responseContainer = document.getElementById("dicresponse");
    var responseArea = document.querySelector(".response-area");

    function escapeHtml(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function renderMarkdown(markdown) {
        var normalized = escapeHtml(markdown || '').replace(/\r\n?/g, '\n').trim();
        if (!normalized) {
            return '';
        }

        function formatInline(text) {
            var codeSpans = [];
            var formatted = text.replace(/`([^`]+)`/g, function(_, code) {
                codeSpans.push(code);
                return '@@CODE' + (codeSpans.length - 1) + '@@';
            });

            formatted = formatted.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
            formatted = formatted.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            formatted = formatted.replace(/__([^_]+)__/g, '<strong>$1</strong>');
            formatted = formatted.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
            formatted = formatted.replace(/(^|[^_])_([^_\n]+)_(?!_)/g, '$1<em>$2</em>');

            return formatted.replace(/@@CODE(\d+)@@/g, function(_, index) {
                return '<code>' + codeSpans[Number(index)] + '</code>';
            });
        }

        var lines = normalized.split('\n');
        var html = [];
        var paragraphLines = [];
        var listItems = [];
        var listType = null;

        function flushParagraph() {
            if (!paragraphLines.length) {
                return;
            }
            html.push('<p>' + formatInline(paragraphLines.join('<br>')) + '</p>');
            paragraphLines = [];
        }

        function flushList() {
            if (!listItems.length || !listType) {
                return;
            }
            html.push('<' + listType + '>' + listItems.map(function(item) {
                return '<li>' + formatInline(item) + '</li>';
            }).join('') + '</' + listType + '>');
            listItems = [];
            listType = null;
        }

        lines.forEach(function(line) {
            var trimmed = line.trim();

            if (!trimmed) {
                flushParagraph();
                flushList();
                return;
            }

            var headingMatch = trimmed.match(/^(#{1,6})\s+(.*)$/);
            if (headingMatch) {
                flushParagraph();
                flushList();
                var level = headingMatch[1].length;
                html.push('<h' + level + '>' + formatInline(headingMatch[2]) + '</h' + level + '>');
                return;
            }

            var unorderedMatch = trimmed.match(/^[-*]\s+(.*)$/);
            if (unorderedMatch) {
                flushParagraph();
                if (listType && listType !== 'ul') {
                    flushList();
                }
                listType = 'ul';
                listItems.push(unorderedMatch[1]);
                return;
            }

            var orderedMatch = trimmed.match(/^\d+\.\s+(.*)$/);
            if (orderedMatch) {
                flushParagraph();
                if (listType && listType !== 'ol') {
                    flushList();
                }
                listType = 'ol';
                listItems.push(orderedMatch[1]);
                return;
            }

            flushList();
            paragraphLines.push(trimmed);
        });

        flushParagraph();
        flushList();
        return html.join('');
    }
    
    function startLoadingAnimation() {
        submitButton.innerHTML = `Loading<span class="loading-dots"></span>`;
        submitButton.disabled = true;
    }
    
    function stopLoadingAnimation() {
        submitButton.innerHTML = 'Submit';
        submitButton.disabled = false;
    }
    
    function processInput() {
        var userInput = searchInput.value;
        if (!userInput.trim()) {
            // Don't process empty inputs
            return;
        }
        
        searchInput.disabled = true;
        startLoadingAnimation();
        
        // Remove empty class to show response area is active
        responseArea.classList.remove('empty');
        
        fetch('https://kumubot.pythonanywhere.com/dictionary', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                search: userInput
            }),
        })
        .then(response => response.json())
        .then(data => {
            responseContainer.innerHTML = renderMarkdown(data.result);
            searchInput.disabled = false;
            stopLoadingAnimation();
        })
        .catch((error) => {
            console.error('Error:', error);
            responseContainer.innerHTML = renderMarkdown('An error occurred. Please try again.');
            searchInput.disabled = false;
            stopLoadingAnimation();
        });
    }
    
    // Listen to the click event of the submit button
    submitButton.addEventListener('click', processInput);
    
    // Listen to the keyup event of the input box
    searchInput.addEventListener('keyup', function(e) {
        if (e.key === 'Enter') {
            processInput();
        }
    });
});
</script>
