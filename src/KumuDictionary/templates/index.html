<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KumuDictionary</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dictionary-wrapper">
        <div class="dictionary-container">
            <div class="dictionary-header">
                <h2>KumuDictionary</h2>
            </div>
            
            <div class="dictionary-content">
                <div class="input-area">
                    <div class="search-container">
                        <input type="text" id="dicsearchInput" placeholder="Enter Hawaiian word or phrase here">
                    </div>
                </div>
                
                <div class="response-area empty">
                    <div id="dicresponse" class="markdown-content"></div>
                </div>
                
                <div class="button-container">
                    <button id="dicsubmitButton" class="dictionarysubmit-button">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
